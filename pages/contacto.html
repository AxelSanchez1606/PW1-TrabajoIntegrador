<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/headeryfooter.css">
    <link rel="stylesheet" href="../assets/main.css">
    <title>PasajesAereos - Contacto</title>
</head>
<body>
    <header>
        <nav class="nav_header">
            <img class="img_header" src="../Imagenes/fondo-transparente.png" alt="PasajesAereos Logo" width="100">
            <ul class="ul_header">
                <li class="li_header"><a href="../index.html">Inicio</a></li>
                <li class="li_header"><a href="../pages/vuelos.html">Vuelos</a></li>
                <li class="li_header"><a href="ofertas.html">Ofertas</a></li>
                <li class="li_header"><a href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2 class="titulo-principal">Contactanos</h2>
            <form>
                <div class="formulario">
                        <div class="linea-formulario">
                            <label for="nombre">Nombre: </label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>
                        <div class="linea-formulario">
                            <label for="email">Email: </label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="linea-formulario">
                            <label for="telefono">Tel: </label>
                            <input type="tel" id="telefono" name="telefono">
                        </div>
                        <div class="linea-formulario">
                            <label for="mensaje">Mensaje: </label>
                            <input type="text" id="mensaje" name="mensaje">
                        </div>
                        <div class="botones-formulario">
                            <button type="submit">Enviar</button>
                            <button type="reset">Cancelar</button>
                        </div>
                    </div>
            </form>
        </section>
    </main>
    <footer>
        <ul class="ul_footer">
            <h3>Integrantes</h3>
            <li>Axel</li>
            <li>Ariel</li>
            <li>Bautista</li>
            <li>Leandro</li>
            <li>Rocio</li>
        </ul>
    </footer>
</body>
</html>
