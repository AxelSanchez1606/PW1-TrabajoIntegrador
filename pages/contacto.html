<body>
    <header>

            <img class="img_header" src="../Imagenes/fondo-transparente.png" alt="PasajesAereos Logo" width="100">

    <main>
        <section>
            <div class="titulo-principal">
                <h2>Contacto</h2>
                <h3>Envíanos tu mensaje</h3>
            </div>
            <form>
                <div class="formulario formulario-contacto">
                        <div class="linea-formulario">
                            <label for="nombre">Nombre: </label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>
                        <div class="linea-formulario">
                            <label for="email">Email: </label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="linea-formulario">
                            <label for="telefono">Tel: </label>
                            <input type="tel" id="telefono" name="telefono">
                        </div>
                        <div class="linea-formulario">
                            <label for="mensaje">Mensaje: </label>
                            <textarea id="mensaje" name="mensaje"></textarea>
                        </div>
                        <div class="botones-formulario">
                            <button type="submit">Enviar</button>
                            <button type="reset">Cancelar</button>
                        </div>
                    </div>
            </form>
        </section>
    </main>

        <ul class="ul_footer">
            <img class="img-footer" src="../Imagenes/loguitoPW1.png" alt="Logo PW1">
